name: Release

# Publishes @kornorg/design-system to npm when a GitHub Release is published,
# using npm Trusted Publishing (OIDC) — no long-lived NPM_TOKEN to manage.
#
# One-time setup on npmjs.com (package → Settings → Publishing access →
# Trusted Publisher), for @kornorg/design-system:
#   Publisher:         GitHub Actions
#   Organization/user: kornsour
#   Repository:        design-system
#   Workflow filename: release.yml   (filename only, not a path)
#   Environment:       (leave blank)
#
# The publish step uses the npm CLI (not pnpm) because npm has first-class OIDC
# support; pnpm has had OIDC 404 regressions. pnpm still builds the package via
# the `prepack` script. No token is needed under OIDC. Provenance is requested
# explicitly with --provenance: despite npm's docs claiming it is automatic under
# trusted publishing, v0.3.0 published without an attestation until the flag was
# added. Requires npm >= 11.5.1.
#
# The published version is whatever is in package.json — bump + commit it before
# cutting the Release.
on:
  release:
    types: [published]

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  publish:
    name: Build & publish to npm
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write # required for npm trusted publishing (OIDC)
    steps:
      - uses: actions/checkout@v6

      - name: Install pnpm
        uses: pnpm/action-setup@v6

      - name: Setup Node.js
        uses: actions/setup-node@v7
        with:
          node-version-file: .nvmrc
          registry-url: https://registry.npmjs.org
          # Avoid cached credentials on release builds (npm trusted-publishing guidance)
          package-manager-cache: false

      - name: Ensure npm supports trusted publishing (>= 11.5.1)
        run: npm install -g npm@latest

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      # npm publish runs the `prepack` script (pnpm build) and authenticates via
      # OIDC — no NPM_TOKEN. --provenance attaches a build attestation.
      - name: Publish to npm
        run: npm publish --provenance
